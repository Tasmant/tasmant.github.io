<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Le site de Killian Paul</title>
  <meta name="description" content="Réflexions sur la musique, les livres et les jeux vidéo">
  <link rel="stylesheet" href="https://unpkg.com/sakura.css/css/sakura-dark.css">
</head>
<body>

  <button onclick="setLang('fr')" style="background:#333; color:#fff; border:1px solid #555; padding:4px 10px; cursor:pointer; border-radius:4px;">🇫🇷 Français</button>
  <button onclick="setLang('en')" style="background:#333; color:#fff; border:1px solid #555; padding:4px 10px; cursor:pointer; border-radius:4px;">🇬🇧 English</button>

  <div class="fr">
    <h1>Le site de Killian Paul</h1>
    <nav>
      <a href="livres.html">📚 Livres</a> ·
      <a href="musique.html">🎵 Musique</a> ·
      <a href="jeuxvideo.html">🎮 Jeux vidéo</a>
    </nav>
    <p>Bienvenue sur ma page.</p>
  </div>

  <div class="en" style="display:none">
    <h1>Killian Paul's Webpage</h1>
    <nav>
      <a href="books.html">📚 Books</a> ·
      <a href="music.html">🎵 Music</a> ·
      <a href="videogames.html">🎮 Videogames</a>
    </nav>
    <p>Welcome to my webpage.</p>
  </div>

  <script>
    function setLang(lang) {
      document.querySelectorAll('.fr, .en').forEach(el => el.style.display = 'none');
      document.querySelectorAll('.' + lang).forEach(el => el.style.display = '');
    }
  </script>

</body>
</html>
